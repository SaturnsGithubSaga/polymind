model_list:

  # --- FREE MODELS via OpenRouter ---

  - model_name: llama-3.3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gemini-flash-free
    litellm_params:
      model: openrouter/google/gemini-2.0-flash-exp:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: qwen-2.5-72b
    litellm_params:
      model: openrouter/qwen/qwen-2.5-72b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # --- PAID MODELS via OpenRouter ---

  - model_name: gpt-4o-mini
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: claude-haiku
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: grok
    litellm_params:
      model: openrouter/x-ai/grok-4.3
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # --- PAID MODEL via Google API (direct) ---

  - model_name: gemini-flash-paid
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY

litellm_settings:
  # Return usage headers so we get accurate token counts
  success_callback: []
  drop_params: true          # silently drop unsupported params per model
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
